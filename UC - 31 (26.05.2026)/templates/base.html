<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block titulo %}
        Meu Sistema
        {% endblock %}

    </title>
</head>
<style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
            color: #333;

            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header{
            background-color: #222;
            color: white;
            padding: 15px 30px;
        }

        .navbar{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo{
            font-size: 24px;
            font-weight: bold;
        }

        .menu a{
            color: white;
            text-decoration: none;
            margin-left: 20px;
            transition: 0.3s;
        }

        .menu a:hover{
            color: #00bfff;
        }

        main{
            flex: 1;
            padding: 40px;
        }

        .card{
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        .card h1{
            margin-bottom: 15px;
        }

        .card p{
            line-height: 1.6;
        }

        footer{
            background-color: #222;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 30px;
        }

    </style>

<body>
    
<header>

    <div class="navbar">

        <div class="logo">
            MeuSite
        </div>


        <div class="menu">
            <a href="/">Inicio</a>
            <a href="/sobre">Sobre</a>
            <a href="/servicos">Servicos</a>
            <a href="/contato">Contato</a>

        </div>

    </div>



</header>


<main>
    {% block conteudo %}
    {% endblock %}

</main>

<footer>
    <p> 2026 - Todos os direitos reservados </p>
</footer>

</body>
</html>
