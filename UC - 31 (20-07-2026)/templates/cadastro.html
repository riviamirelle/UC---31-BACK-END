<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Livros</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#dbeafe;
        }

        .container{
            width:500px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        h1{
            text-align:center;
            color:#0b5394;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
            color:#0b5394;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #8ab4f8;
            border-radius:5px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border:2px solid #1e88e5;
        }

        button{
            width:100%;
            margin-top:25px;
            padding:12px;
            background:#1565c0;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0d47a1;
        }

        .menu{
            text-align:center;
            margin-top:20px;
        }

        .menu a{
            text-decoration:none;
            color:#1565c0;
            margin:0 10px;
            font-weight:bold;
        }

        .menu a:hover{
            text-decoration:underline;
        }

        .mensagem{
            text-align:center;
            color:red;
            margin-bottom:15px;
            font-weight:bold;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>Cadastro de Livros</h1>

    {% if mensagem %}
        <p class="mensagem">{{ mensagem }}</p>
    {% endif %}

    <form method="POST">

        <label>Título</label>
        <input type="text" name="titulo">

        <label>Autor</label>
        <input type="text" name="autor">

        <label>Ano de publicação</label>
        <input type="text" name="ano">

        <label>Categoria</label>
        <input type="text" name="categoria">

        <label>Quantidade de exemplares</label>
        <input type="number" name="quantidade">

        <button type="submit">
            Cadastrar Livro
        </button>

    </form>

    <div class="menu">

        <a href="{{ url_for('listar') }}">Lista de Livros</a>

        |

        <a href="{{ url_for('buscar') }}">Buscar Livro</a>

    </div>

</div>

</body>
</html>
