<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Buscar Livro</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#dbeafe;
        }

        .container{
            width:500px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        h1{
            text-align:center;
            color:#0b5394;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-bottom:8px;
            color:#0b5394;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #90caf9;
            border-radius:5px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border:2px solid #1565c0;
        }

        button{
            width:100%;
            margin-top:20px;
            padding:12px;
            background:#1565c0;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0d47a1;
        }

        .resultado{
            margin-top:25px;
            background:#eef7ff;
            border-left:5px solid #1565c0;
            padding:15px;
            border-radius:5px;
        }

        .resultado p{
            margin:8px 0;
        }

        .mensagem{
            margin-top:20px;
            text-align:center;
            color:red;
            font-weight:bold;
        }

        .menu{
            text-align:center;
            margin-top:25px;
        }

        .menu a{
            text-decoration:none;
            color:white;
            background:#1565c0;
            padding:10px 16px;
            border-radius:5px;
            margin:0 8px;
        }

        .menu a:hover{
            background:#0d47a1;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Buscar Livro</h1>

    <form method="POST">

        <label>Digite o título do livro</label>

        <input
            type="text"
            name="titulo"
            placeholder="Ex.: Dom Casmurro"
        >

        <button type="submit">
            Buscar
        </button>

    </form>

    {% if livro %}

    <div class="resultado">

        <p><strong>Título:</strong> {{ livro.titulo }}</p>

        <p><strong>Autor:</strong> {{ livro.autor }}</p>

        <p><strong>Ano:</strong> {{ livro.ano }}</p>

        <p><strong>Categoria:</strong> {{ livro.categoria }}</p>

        <p><strong>Quantidade:</strong> {{ livro.quantidade }}</p>

    </div>

    {% endif %}

    {% if mensagem %}

        <p class="mensagem">
            {{ mensagem }}
        </p>

    {% endif %}

    <div class="menu">

        <a href="{{ url_for('cadastro') }}">
            Cadastro
        </a>

        <a href="{{ url_for('listar') }}">
            Lista de Livros
        </a>

    </div>

</div>

</body>
</html>
