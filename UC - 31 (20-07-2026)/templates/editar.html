<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Livro</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#dbeafe;
        }

        .container{
            width:500px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        h1{
            text-align:center;
            color:#0b5394;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
            color:#0b5394;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #90caf9;
            border-radius:5px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border:2px solid #1565c0;
        }

        button{
            width:100%;
            margin-top:25px;
            padding:12px;
            background:#1565c0;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0d47a1;
        }

        .menu{
            text-align:center;
            margin-top:25px;
        }

        .menu a{
            text-decoration:none;
            color:white;
            background:#1565c0;
            padding:10px 16px;
            border-radius:5px;
        }

        .menu a:hover{
            background:#0d47a1;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Editar Livro</h1>

    <form method="POST">

        <label>Título</label>
        <input
            type="text"
            name="titulo"
            value="{{ livro.titulo }}"
            required
        >

        <label>Autor</label>
        <input
            type="text"
            name="autor"
            value="{{ livro.autor }}"
            required
        >

        <label>Ano de publicação</label>
        <input
            type="text"
            name="ano"
            value="{{ livro.ano }}"
            required
        >

        <label>Categoria</label>
        <input
            type="text"
            name="categoria"
            value="{{ livro.categoria }}"
            required
        >

        <label>Quantidade de exemplares</label>
        <input
            type="number"
            name="quantidade"
            value="{{ livro.quantidade }}"
            min="1"
            required
        >

        <button type="submit">
            Salvar Alterações
        </button>

    </form>

    <div class="menu">

        <a href="{{ url_for('listar') }}">
            Voltar para a Lista
        </a>

    </div>

</div>

</body>
</html>
