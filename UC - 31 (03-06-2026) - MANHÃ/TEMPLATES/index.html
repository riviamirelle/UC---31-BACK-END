<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    background:#f4f4f4;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:700px;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
    border-top:8px solid #006847;
}

h1{
    text-align:center;
    color:#7A1F2B;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:12px;
    margin-bottom:5px;
    color:#7A1F2B;
    font-weight:bold;
}

input,
select{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:8px;
    outline:none;
    transition:.3s;
}

input:focus,
select:focus{
    border-color:#006847;
    box-shadow:0 0 8px rgba(0,104,71,.3);
}

button{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#7A1F2B;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#5e1821;
}

</style>
</head>

<body>

<div class="container">

<h1>Cadastro de Alunos</h1>

<form action="/cadastro" method="POST">

<label>Nome Completo</label>
<input type="text" name="nome">

<label>E-mail</label>
<input type="text" name="email">

<label>Telefone</label>
<input type="text" name="telefone" placeholder="(85) 99999-9999">

<label>CPF</label>
<input type="text" name="cpf" placeholder="000.000.000-00">

<label>Cidade</label>
<input type="text" name="cidade">

<label>Estado</label>
<input type="text" name="estado" placeholder="CE">

<label>Curso</label>
<select name="curso">
    <option value="">Selecione um curso</option>
    <option>Desenvolvimento de Sistemas</option>
    <option>Informática</option>
    <option>Administração</option>
    <option>Redes de Computadores</option>
</select>

<label>Idade</label>
<input type="text" name="idade">

<label>Senha</label>
<input type="password" name="senha">

<button type="submit">
    Cadastrar
</button>

</form>

</div>

</body>
</html>
