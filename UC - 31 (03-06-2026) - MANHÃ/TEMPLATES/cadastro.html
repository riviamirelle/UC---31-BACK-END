<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Resultado do Cadastro</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f5f2f2;
        }

        .container{
            width:600px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 0 15px rgba(0,0,0,0.15);
            border-top:6px solid #8B3A3A;
        }

        h1{
            text-align:center;
            margin-bottom:20px;
            color:#8B3A3A;
        }

        .sucesso{
            background:#d4edda;
            color:#155724;
            padding:15px;
            border-radius:8px;
            margin-bottom:20px;
        }

        .erro{
            background:#f8d7da;
            color:#721c24;
            padding:15px;
            border-radius:8px;
            margin-bottom:20px;
        }

        p{
            margin:10px 0;
            font-size:18px;
        }

        strong{
            color:#8B3A3A;
        }

        a{
            display:inline-block;
            margin-top:20px;
            text-decoration:none;
            background:#2E8B57;
            color:white;
            padding:10px 20px;
            border-radius:6px;
        }

        a:hover{
            background:#256f46;
        }
    </style>
</head>
<body>

<div class="container">

    {% if sucesso %}
        <div class="sucesso">
            {{ mensagem }}
        </div>

        <p><strong>Nome:</strong> {{ nome }}</p>
        <p><strong>E-mail:</strong> {{ email }}</p>
        <p><strong>Telefone:</strong> {{ telefone }}</p>
        <p><strong>CPF:</strong> {{ cpf }}</p>
        <p><strong>Cidade:</strong> {{ cidade }}</p>
        <p><strong>Estado:</strong> {{ estado }}</p>
        <p><strong>Curso:</strong> {{ curso }}</p>
        <p><strong>Idade:</strong> {{ idade }}</p>

    {% else %}
        <div class="erro">
            {{ mensagem }}
        </div>
    {% endif %}

    <a href="/">Voltar</a>

</div>

</body>
</html>
