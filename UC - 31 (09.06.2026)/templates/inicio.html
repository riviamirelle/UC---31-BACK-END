<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body class="{{ tema }}">

    <div class="card">

        <h1>Minhas Preferências</h1>

        {% if nome %}
            <h2>Olá, {{ nome }}! </h2>
            <p>Que bom ter você novamente por aqui.</p>
        {% else %}
            <h2>Seja bem-vindo(a)! </h2>
            <p>Informe seu nome para personalizar sua experiência.</p>
        {% endif %}

        <form action="/salvar_nome" method="POST">

            <input
                type="text"
                name="nome"
                placeholder="Digite seu nome"
                required
            >

            <button type="submit">
                Salvar Nome
            </button>

        </form>

        <div class="linha"></div>

        <h3>Escolha o tema</h3>

        <div class="botoes">

            <a href="/tema/claro">
                <button class="btn-claro">
                    Tema Claro
                </button>
            </a>

            <a href="/tema/escuro">
                <button class="btn-escuro">
                    Tema Escuro
                </button>
            </a>

        </div>

    </div>

</body>
</html>
